<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b9ee6"/>
      <stop offset="100%" stop-color="#3a7bc8"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="44" height="44" rx="10" fill="url(#bg)"/>
  <!-- keyboard body -->
  <rect x="8" y="16" width="32" height="20" rx="3" fill="#fff" opacity="0.95"/>
  <!-- keys row 1 -->
  <rect x="10" y="18" width="4" height="4" rx="0.8" fill="#4a90d9"/>
  <rect x="15.5" y="18" width="4" height="4" rx="0.8" fill="#4a90d9"/>
  <rect x="21" y="18" width="4" height="4" rx="0.8" fill="#4a90d9"/>
  <rect x="26.5" y="18" width="4" height="4" rx="0.8" fill="#4a90d9"/>
  <rect x="32" y="18" width="6" height="4" rx="0.8" fill="#4a90d9"/>
  <!-- keys row 2 -->
  <rect x="10" y="23.5" width="5.5" height="4" rx="0.8" fill="#4a90d9"/>
  <rect x="17" y="23.5" width="4" height="4" rx="0.8" fill="#4a90d9"/>
  <rect x="22.5" y="23.5" width="4" height="4" rx="0.8" fill="#4a90d9"/>
  <rect x="28" y="23.5" width="4" height="4" rx="0.8" fill="#4a90d9"/>
  <rect x="33.5" y="23.5" width="4.5" height="4" rx="0.8" fill="#4a90d9"/>
  <!-- spacebar -->
  <rect x="14" y="29" width="20" height="4.5" rx="1.5" fill="#4a90d9"/>
  <!-- cursor blink indicator -->
  <rect x="11" y="8" width="2" height="6" rx="1" fill="#fff">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
