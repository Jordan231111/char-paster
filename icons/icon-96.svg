<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b9ee6"/>
      <stop offset="100%" stop-color="#3a7bc8"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="88" height="88" rx="20" fill="url(#bg)"/>
  <!-- keyboard body -->
  <rect x="16" y="32" width="64" height="40" rx="6" fill="#fff" opacity="0.95"/>
  <!-- keys row 1 -->
  <rect x="20" y="36" width="8" height="8" rx="1.5" fill="#4a90d9"/>
  <rect x="31" y="36" width="8" height="8" rx="1.5" fill="#4a90d9"/>
  <rect x="42" y="36" width="8" height="8" rx="1.5" fill="#4a90d9"/>
  <rect x="53" y="36" width="8" height="8" rx="1.5" fill="#4a90d9"/>
  <rect x="64" y="36" width="12" height="8" rx="1.5" fill="#4a90d9"/>
  <!-- keys row 2 -->
  <rect x="20" y="47" width="11" height="8" rx="1.5" fill="#4a90d9"/>
  <rect x="34" y="47" width="8" height="8" rx="1.5" fill="#4a90d9"/>
  <rect x="45" y="47" width="8" height="8" rx="1.5" fill="#4a90d9"/>
  <rect x="56" y="47" width="8" height="8" rx="1.5" fill="#4a90d9"/>
  <rect x="67" y="47" width="9" height="8" rx="1.5" fill="#4a90d9"/>
  <!-- spacebar -->
  <rect x="28" y="58" width="40" height="9" rx="3" fill="#4a90d9"/>
  <!-- cursor blink indicator -->
  <rect x="22" y="16" width="4" height="12" rx="2" fill="#fff">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
